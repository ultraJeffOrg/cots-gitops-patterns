apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# These patches are applied via SSA with Force (see root/ocp-overrides.yaml)
# so they take final ownership of these fields from the base install
patches:
  - path: patches/fix-scc-frontend.yaml
  - path: patches/fix-scc-api.yaml
  - path: patches/fix-scc-worker.yaml
  - path: patches/routes.yaml
