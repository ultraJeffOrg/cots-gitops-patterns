# Wave 1: Apply OpenShift-specific overrides on top of the base install
# Uses ServerSideApply + Force to take ownership of fields from the base app
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cots-ocp-overrides
  namespace: openshift-gitops
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  project: default
  destination:
    server: https://kubernetes.default.svc
    namespace: cots-app
  source:
    repoURL: https://github.com/your-org/cots-app-config.git
    targetRevision: main
    path: app-of-apps-layered/overrides
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ServerSideApply=true
      - Force=true
